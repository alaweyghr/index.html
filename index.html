<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="257cf7e9-8367-4520-83c2-672f4f5db331.png">
    <title>ELIY</title>
    <style>
        :root {
            --apple-bg: #0b1c16;
            --apple-card: rgba(22, 45, 36, 0.7);
            --apple-gold: #d4af37;
            --apple-text: #ffffff;
            --apple-blur: blur(20px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Arabic", sans-serif;
            background-color: var(--apple-bg);
            background-image: radial-gradient(circle at top, #162d24 0%, #0b1c16 100%);
            color: var(--apple-text);
            margin: 0; padding: 0;
            height: 100vh; overflow: hidden;
            -webkit-user-select: none;
        }

        .header { padding: 50px 20px 10px; text-align: center; }
        .header img { width: 60px; height: 60px; border-radius: 15px; border: 1px solid var(--apple-gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }

        .content-area { height: calc(100vh - 180px); overflow-y: auto; padding: 0 20px; }
        .page { display: none; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--apple-card);
            backdrop-filter: var(--apple-blur);
            -webkit-backdrop-filter: var(--apple-blur);
            border-radius: 25px; padding: 25px; margin-bottom: 20px;
            border: 0.5px solid rgba(212, 175, 55, 0.3);
            text-align: center;
        }

        .prayer-val { font-size: 52px; font-weight: 200; color: var(--apple-gold); letter-spacing: -1px; margin: 10px 0; }
        
        .btn-action {
            background: linear-gradient(135deg, #d4af37 0%, #b8962e 100%);
            color: #0b1c16; border: none; border-radius: 20px;
            padding: 20px; width: 100%; font-size: 18px; font-weight: 700;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            cursor: pointer; transition: 0.2s;
        }
        .btn-action:active { transform: scale(0.96); opacity: 0.9; }

        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: rgba(11, 28, 22, 0.9); backdrop-filter: var(--apple-blur);
            display: flex; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom);
            border-top: 0.5px solid rgba(255,255,255,0.1);
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 11px; flex: 1; }
        .tab-item.active { color: var(--apple-gold); }
        .tab-item span { font-size: 26px; margin-bottom: 5px; }

        .f-stat { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
        .f-stat:last-child { border: none; }
    </style>
</head>
<body>

    <div class="header">
        <img src="257cf7e9-8367-4520-83c2-672f4f5db331.png" alt="ELIY">
    </div>

    <div class="content-area">
        <!-- صفحة الصلوات -->
        <div id="page-prayers" class="page active">
            <div class="card">
                <div id="p-name" style="font-size: 18px; color: var(--apple-gold);">صلاة الفجر</div>
                <div id="p-timer" class="prayer-val">00:00:00</div>
                <div style="font-size: 12px; opacity: 0.6;">متبقي على الشروق</div>
            </div>
        </div>

        <!-- صفحة الجنائز -->
        <div id="page-funerals" class="page">
            <h3 style="text-align: center; margin-bottom: 20px;">إحصائيات الجنائز اليوم</h3>
            <div id="f-container">
                <div class="card">جاري الاتصال بالنظام...</div>
            </div>
        </div>

        <!-- صفحة الورد -->
        <div id="page-quran" class="page">
            <div class="card">
                <div style="font-size: 14px; opacity: 0.7;">ورد اليوم من</div>
                <div id="q-surah" style="font-size: 28px; margin: 15px 0; color: var(--apple-gold);">سورة الفاتحة</div>
                <div style="font-size: 65px; font-weight: 100; margin-bottom: 10px;">ص <span id="q-page">1</span></div>
                <div style="margin-bottom: 25px; font-size: 14px; color: #aaa;">الهدف القادم: صفحة <span id="q-target">5</span></div>
                <button class="btn-action" onclick="addPages()">تمت القراءة</button>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="tab('prayers', this)"><span>🕒</span>الصلوات</div>
        <div class="tab-item" onclick="tab('funerals', this)"><span>🕌</span>الجنائز</div>
        <div class="tab-item" onclick="tab('quran', this)"><span>📖</span>الورد</div>
    </nav>

    <script>
        // مصفوفة السور الكاملة بناءً على ملفك
        const quranData = [
            {n:"الفاتحة", s:1, e:1}, {n:"البقرة", s:2, e:49}, {n:"آل عمران", s:50, e:76}, {n:"النساء", s:77, e:106},
            {n:"المائدة", s:106, e:127}, {n:"الأنعام", s:128, e:150}, {n:"الأعراف", s:151, e:176}, {n:"الأنفال", s:177, e:186},
            {n:"التوبة", s:187, e:207}, {n:"يونس", s:208, e:221}, {n:"هود", s:221, e:235}, {n:"يوسف", s:235, e:248},
            {n:"الرعد", s:249, e:255}, {n:"إبراهيم", s:255, e:261}, {n:"الحجر", s:262, e:267}, {n:"النحل", s:267, e:281},
            {n:"الإسراء", s:282, e:293}, {n:"الكهف", s:293, e:304}, {n:"مريم", s:305, e:312}, {n:"طه", s:312, e:321},
            {n:"الأنبياء", s:322, e:331}, {n:"الحج", s:332, e:341}, {n:"المؤمنون", s:342, e:349}, {n:"النور", s:350, e:359},
            {n:"الفرقان", s:359, e:366}, {n:"الشعراء", s:367, e:376}, {n:"النمل", s:377, e:385}, {n:"القصص", s:385, e:396},
            {n:"العنكبوت", s:396, e:404}, {n:"الروم", s:404, e:410}, {n:"لقمان", s:411, e:414}, {n:"السجدة", s:415, e:417},
            {n:"الأحزاب", s:418, e:427}, {n:"سبأ", s:428, e:434}, {n:"فاطر", s:434, e:440}, {n:"يس", s:440, e:445},
            {n:"الصافات", s:446, e:452}, {n:"ص", s:453, e:458}, {n:"الزمر", s:458, e:467}, {n:"غافر", s:467, e:476},
            {n:"فصلت", s:477, e:482}, {n:"الشورى", s:483, e:489}, {n:"الزخرف", s:489, e:495}, {n:"الدخان", s:496, e:498},
            {n:"الجاثية", s:499, e:502}, {n:"الأحقاف", s:502, e:506}, {n:"محمد", s:507, e:510}, {n:"الفتح", s:511, e:515},
            {n:"الحجرات", s:515, e:517}, {n:"ق", s:518, e:520}, {n:"الذاريات", s:520, e:523}, {n:"الطور", s:523, e:525},
            {n:"النجم", s:526, e:528}, {n:"القمر", s:528, e:531}, {n:"الرحمن", s:531, e:534}, {n:"الواقعة", s:534, e:537},
            {n:"الحديد", s:537, e:541}, {n:"المجادلة", s:542, e:545}, {n:"الحشر", s:545, e:548}, {n:"الممتحنة", s:549, e:551},
            {n:"الصف", s:551, e:553}, {n:"الجمعة", s:553, e:554}, {n:"المنافقون", s:554, e:556}, {n:"التغابن", s:556, e:558},
            {n:"الطلاق", s:558, e:560}, {n:"التحريم", s:560, e:562}, {n:"الملك", s:562, e:564}, {n:"القلم", s:564, e:566},
            {n:"الحاقة", s:566, e:568}, {n:"المعارج", s:568, e:570}, {n:"نوح", s:570, e:572}, {n:"الجن", s:572, e:574},
            {n:"المزمل", s:574, e:575}, {n:"المدثر", s:575, e:577}, {n:"القيامة", s:577, e:578}, {n:"الإنسان", s:578, e:580},
            {n:"المرسلات", s:580, e:581}, {n:"النبأ", s:582, e:583}, {n:"النازعات", s:583, e:585}, {n:"عبس", s:585, e:586},
            {n:"التكوير", s:586, e:587}, {n:"الانفطار", s:587, e:587}, {n:"المطففين", s:587, e:589}, {n:"الانشقاق", s:589, e:590},
            {n:"البروج", s:590, e:590}, {n:"الطارق", s:591, e:591}, {n:"الأعلى", s:591, e:592}, {n:"الغاشية", s:592, e:593},
            {n:"الفجر", s:593, e:594}, {n:"البلد", s:594, e:595}, {n:"الشمس", s:595, e:595}, {n:"الليل", s:595, e:596},
            {n:"الضحى", s:596, e:596}, {n:"الشرح", s:596, e:597}, {n:"التين", s:597, e:597}, {n:"العلق", s:597, e:598},
            {n:"القدر", s:598, e:598}, {n:"البينة", s:598, e:599}, {n:"الزلزلة", s:599, e:599}, {n:"العاديات", s:599, e:600},
            {n:"القارعة", s:600, e:600}, {n:"التكاثر", s:600, e:600}, {n:"العصر", s:601, e:601}, {n:"الهمزة", s:601, e:601},
            {n:"الفيل", s:601, e:601}, {n:"قريش", s:602, e:602}, {n:"الماعون", s:602, e:602}, {n:"الكوثر", s:602, e:602},
            {n:"الكافرون", s:603, e:603}, {n:"النصر", s:603, e:603}, {n:"المسد", s:603, e:603}, {n:"الإخلاص", s:604, e:604},
            {n:"الفلق", s:604, e:604}, {n:"الناس", s:604, e:604}
        ];

        let currP = localStorage.getItem('currP') ? parseInt(localStorage.getItem('currP')) : 1;

        function updateQuran() {
            document.getElementById('q-page').innerText = currP;
            document.getElementById('q-target').innerText = Math.min(currP + 4, 604);
            const surah = quranData.find(x => currP >= x.s && currP <= x.e);
            if (surah) document.getElementById('q-surah').innerText = "سورة " + surah.n;
            localStorage.setItem('currP', currP);
        }

        function addPages() { currP = Math.min(currP + 4, 604); updateQuran(); }

        // ربط الجنائز بالرابط الذي زودتني به
        async function fetchF() {
            const URL = "https://script.google.com/macros/s/AKfycbwKXOikhG5yz-KC2B6gJUZUbomAJ2qf7TqVqJBhWnnlESAhBM4QTydgn08cF9H7Jp0/exec?type=json";
            try {
                const res = await fetch(URL);
                const d = await res.json();
                document.getElementById('f-container').innerHTML = `
                    <div class="card">
                        <div class="f-stat"><span>صلاة الظهر</span><b>${d.counts.Dhuhr} جنازة</b></div>
                        <div class="f-stat"><span>صلاة العصر</span><b>${d.counts.Asr} جنازة</b></div>
                        <div class="f-stat"><span>صلاة المغرب</span><b>${d.counts.Maghrib} جنازة</b></div>
                        <div class="f-stat"><span>صلاة العشاء</span><b>${d.counts.Isha} جنازة</b></div>
                    </div>
                `;
            } catch (e) { document.getElementById('f-container').innerHTML = '<div class="card">فشل تحديث البيانات</div>'; }
        }

        function tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            el.classList.add('active');
            if (id === 'funerals') fetchF();
        }

        updateQuran();
    </script>
</body>
</html>
