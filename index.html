<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="تطبيقي الخاص">
    <link rel="apple-touch-icon" href="257cf7e9-8367-4520-83c2-672f4f5db331.png">
    <title>تطبيقي الخاص</title>
    <style>
        :root {
            --apple-bg: #0b1c16;
            --apple-card: rgba(22, 45, 36, 0.7);
            --apple-gold: #d4af37;
            --apple-text: #ffffff;
            --apple-blur: blur(20px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Arabic", sans-serif;
            background-color: var(--apple-bg);
            background-image: radial-gradient(circle at top, #162d24 0%, #0b1c16 100%);
            color: var(--apple-text);
            margin: 0; padding: 0;
            height: 100vh; overflow: hidden;
        }

        .header { padding: 50px 20px 10px; text-align: center; }
        .header img { width: 60px; border-radius: 15px; border: 1px solid var(--apple-gold); }

        .content-area { height: calc(100vh - 180px); overflow-y: auto; padding: 0 20px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--apple-card);
            backdrop-filter: var(--apple-blur);
            border-radius: 25px; padding: 25px; margin-bottom: 20px;
            border: 0.5px solid rgba(212, 175, 55, 0.3);
            text-align: center;
        }

        .prayer-val { font-size: 52px; font-weight: 200; color: var(--apple-gold); letter-spacing: -1px; }
        
        .btn-action {
            background: linear-gradient(135deg, #d4af37, #b8962e);
            color: #0b1c16; border: none; border-radius: 20px;
            padding: 20px; width: 100%; font-size: 18px; font-weight: 700;
        }

        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: rgba(11, 28, 22, 0.9); backdrop-filter: var(--apple-blur);
            display: flex; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom);
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 11px; flex: 1; }
        .tab-item.active { color: var(--apple-gold); }
        .tab-item span { font-size: 24px; margin-bottom: 4px; }

        .f-stat { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="header">
        <img src="257cf7e9-8367-4520-83c2-672f4f5db331.png" alt="Logo">
    </div>

    <div class="content-area">
        <!-- صفحة الصلوات المحدثة -->
        <div id="page-prayers" class="page active">
            <div class="card">
                <div id="p-name" style="font-size: 18px; color: var(--apple-gold);">جاري الحساب...</div>
                <div id="p-timer" class="prayer-val">00:00:00</div>
                <div id="p-subtext" style="font-size: 12px; opacity: 0.6;">متبقي على الصلاة القادمة</div>
            </div>
        </div>

        <!-- صفحة الجنائز -->
        <div id="page-funerals" class="page">
            <h3 style="text-align: center;">الجنائز (الرياض)</h3>
            <div id="f-container"><div class="card">اضغط للتحديث</div></div>
        </div>

        <!-- صفحة الورد -->
        <div id="page-quran" class="page">
            <div class="card">
                <div id="q-surah" style="font-size: 24px; color: var(--apple-gold);">سورة الفاتحة</div>
                <div class="prayer-val" style="font-size: 65px;">ص <span id="q-page">1</span></div>
                <button class="btn-action" onclick="addPages()">تمت القراءة (4 صفحات)</button>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="tab('prayers', this)"><span>🕒</span>الصلوات</div>
        <div class="tab-item" onclick="tab('funerals', this)"><span>🕌</span>الجنائز</div>
        <div class="tab-item" onclick="tab('quran', this)"><span>📖</span>الورد</div>
    </nav>

    <script>
        // نظام حساب مواقيت الصلاة للرياض (تقريبي ثابت لعام 2026)
        const prayerTimes = [
            { name: "الفجر", time: "04:15" },
            { name: "الشروق", time: "05:40" },
            { name: "الظهر", time: "12:05" },
            { name: "العصر", time: "15:30" },
            { name: "المغرب", time: "18:35" },
            { name: "العشاء", time: "20:05" }
        ];

        function updateCountdown() {
            const now = new Date();
            let nextP = null;

            for (let p of prayerTimes) {
                let pDate = new Date();
                let [h, m] = p.time.split(':');
                pDate.setHours(h, m, 0);

                if (pDate > now) {
                    nextP = { name: p.name, time: pDate };
                    break;
                }
            }

            if (!nextP) { // إذا انتهت صلوات اليوم، ننتقل لفجر الغد
                let pDate = new Date();
                pDate.setDate(pDate.getDate() + 1);
                pDate.setHours(4, 15, 0);
                nextP = { name: "فجر الغد", time: pDate };
            }

            const diff = nextP.time - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('p-name').innerText = "موعد " + nextP.name;
            document.getElementById('p-timer').innerText = 
                `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        // منطق الورد القرآني
        let currP = localStorage.getItem('currP') ? parseInt(localStorage.getItem('currP')) : 1;
        function updateQuran() {
            document.getElementById('q-page').innerText = currP;
            localStorage.setItem('currP', currP);
        }
        function addPages() { 
            currP = Math.min(currP + 4, 604); 
            updateQuran();
            if(window.navigator.vibrate) window.navigator.vibrate(100); 
        }

        // جلب الجنائز من رابطك
        async function fetchF() {
            const URL = "https://script.google.com/macros/s/AKfycbwKXOikhG5yz-KC2B6gJUZUbomAJ2qf7TqVqJBhWnnlESAhBM4QTydgn08cF9H7Jp0/exec?type=json";
            try {
                const res = await fetch(URL);
                const d = await res.json();
                document.getElementById('f-container').innerHTML = `
                    <div class="card">
                        <div class="f-stat"><span>الظهر</span><b>${d.counts.Dhuhr}</b></div>
                        <div class="f-stat"><span>العصر</span><b>${d.counts.Asr}</b></div>
                        <div class="f-stat"><span>المغرب</span><b>${d.counts.Maghrib}</b></div>
                        <div class="f-stat"><span>العشاء</span><b>${d.counts.Isha}</b></div>
                    </div>`;
            } catch (e) { document.getElementById('f-container').innerHTML = '<div class="card">خطأ في الاتصال</div>'; }
        }

        function tab(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            el.classList.add('active');
            if (id === 'funerals') fetchF();
        }

        setInterval(updateCountdown, 1000);
        updateQuran();
    </script>
</body>
</html>
