<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إحصائيات الجنائز - الرياض</title>
    <style>
        :root {
            --gold: #d4af37;
            --bg-dark: #0b1c16;
            --card-bg: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: linear-gradient(145deg, #0b1c16, #0f2620);
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .header h1 {
            color: var(--gold);
            font-size: 20px;
            margin-bottom: 5px;
        }

        .header p {
            color: var(--text-dim);
            font-size: 12px;
            margin-top: 0;
        }

        .total-box {
            background: rgba(212, 175, 55, 0.12);
            margin: 20px 0;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-num {
            font-size: 32px;
            font-weight: bold;
            color: var(--gold);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            text-align: right;
        }

        .card-title {
            color: var(--gold);
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .card-num {
            font-size: 24px;
            font-weight: bold;
        }

        /* زر التحديث العلوي */
        #refresh-trigger {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(212, 175, 55, 0.2);
            color: var(--gold);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            border: 1px solid var(--gold);
            backdrop-filter: blur(5px);
            z-index: 1000;
        }

        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="refresh-trigger" onclick="fetchData()">🔄 تحديث البيانات</div>

    <div class="container" id="main-content">
        <div class="header">
            <h1>إحصائيات الجنائز</h1>
            <p id="current-date">الرياض • جاري التحميل...</p>
        </div>

        <div class="total-box">
            <span>إجمالي اليوم</span>
            <div>
                <span class="total-num" id="total-count">0</span>
                <span style="font-size: 12px; color: var(--text-dim);">جنازة</span>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <div class="card-title">☀️ الظهر</div>
                <div class="card-num" id="count-Dhuhr">0</div>
            </div>
            <div class="card">
                <div class="card-title">🌤️ العصر</div>
                <div class="card-num" id="count-Asr">0</div>
            </div>
            <div class="card">
                <div class="card-title">🌅 المغرب</div>
                <div class="card-num" id="count-Maghrib">0</div>
            </div>
            <div class="card">
                <div class="card-title">🌙 العشاء</div>
                <div class="card-num" id="count-Isha">0</div>
            </div>
        </div>

        <p style="font-size: 10px; color: var(--text-dim); margin-top: 20px;" id="last-update">آخر تحديث: --:--</p>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwKXOikhG5yz-KC2B6gJUZUbomAJ2qf7TqVqJBhWnnlESAhBM4QTydgn08cF9H7Jp0/exec?type=json";

        async function fetchData() {
            const btn = document.getElementById('refresh-trigger');
            const content = document.getElementById('main-content');
            
            btn.innerText = "⏳ جاري التحديث...";
            content.classList.add('loading');

            // إضافة الـ Timestamp لمنع الـ Cache نهائياً
            const finalUrl = `${API_URL}&t=${new Date().getTime()}`;

            try {
                const response = await fetch(finalUrl);
                const data = await response.json();
                updateUI(data);
            } catch (error) {
                console.error("خطأ في جلب البيانات:", error);
                alert("تعذر جلب البيانات، تأكد من الاتصال.");
            } finally {
                btn.innerText = "🔄 تحديث البيانات";
                content.classList.remove('loading');
            }
        }

        function updateUI(data) {
            const counts = data.counts;
            
            // تحديث الأرقام
            document.getElementById('count-Dhuhr').innerText = counts.Dhuhr || 0;
            document.getElementById('count-Asr').innerText = counts.Asr || 0;
            document.getElementById('count-Maghrib').innerText = counts.Maghrib || 0;
            document.getElementById('count-Isha').innerText = counts.Isha || 0;

            // حساب الإجمالي
            const total = (counts.Dhuhr || 0) + (counts.Asr || 0) + (counts.Maghrib || 0) + (counts.Isha || 0);
            document.getElementById('total-count').innerText = total;

            // تحديث التاريخ والوقت
            const now = new Date();
            const dateStr = now.toLocaleDateString('ar-SA', { weekday: 'long', month: 'long', day: 'numeric' });
            const timeStr = now.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            
            document.getElementById('current-date').innerText = `الرياض • ${dateStr}`;
            document.getElementById('last-update').innerText = `آخر تحديث: ${timeStr}`;
        }

        // تشغيل تلقائي عند فتح الصفحة
        window.onload = fetchData;
    </script>
</body>
</html>
